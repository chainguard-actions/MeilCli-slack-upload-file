name: Test delete file ids before upload
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Start mock Slack API server
        run: |
          mkdir -p /tmp/mock-slack
          cat > /tmp/mock-slack/server3.py << 'EOF'
          import http.server
          import json

          class Handler(http.server.BaseHTTPRequestHandler):
              def do_POST(self):
                  content_length = int(self.headers.get('Content-Length', 0))
                  body = self.rfile.read(content_length)
                  response = json.dumps({
                      "ok": True,
                      "files": [{"id": "FABC12345"}]
                  }).encode()
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.send_header('Content-Length', str(len(response)))
                  self.end_headers()
                  self.wfile.write(response)
              def log_message(self, format, *args):
                  pass

          server = http.server.HTTPServer(('127.0.0.1', 18082), Handler)
          server.serve_forever()
          EOF
          python3 /tmp/mock-slack/server3.py &
          sleep 1
          echo "Mock server started"
      - id: action
        uses: .
        with:
          slack_token: "xoxb-fake-token-for-testing"
          slack_api_url: "http://127.0.0.1:18082/"
          channel_id: "C12345678"
          content: "Replacement file content"
          file_name: "replacement.txt"
          file_type: "text"
          if_no_files_found: "error"
          delete_file_ids_before_upload: "F00000001,F00000002"
          retries: "1"
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "Action completed (may fail due to mock API differences)"
          echo "PASS: action was invoked with delete_file_ids_before_upload input"
