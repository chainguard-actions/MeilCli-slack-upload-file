name: Test delete file IDs before upload
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          slack_token: xoxb-dummy-token-for-testing
          channel_id: C0000000000
          content: "Replacement file content"
          file_name: replacement.txt
          title: "Replacement File"
          delete_file_ids_before_upload: "F0000000001,F0000000002"
          retries: "1"
      - name: Assert action ran (not skipped)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # With a dummy token the action will fail, but it must not be skipped.
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with outcome=$OUTCOME"
