name: Test delete file ids before upload input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          slack_token: xoxb-fake-token-for-testing
          slack_api_url: http://localhost:9999/
          channel_id: C0000000000
          content: "Replacement file content"
          delete_file_ids_before_upload: "F0000000001,F0000000002"
      - name: Assert action ran with delete_file_ids_before_upload input
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action will fail because the slack_api_url is not real,
          # but we just need to verify the action was invoked with delete_file_ids_before_upload.
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action was invoked with delete_file_ids_before_upload input"
