name: Test custom slack_api_url input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          slack_token: xoxb-fake-token-for-testing
          slack_api_url: https://slack.example.invalid/api/
          channel_id: C0000000000
          content: "Hello from act test with custom api url"
          file_name: test-output.txt
          title: "Act Test Upload Custom API URL"
      - name: Assert action ran with custom slack_api_url
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # With a fake/unreachable API URL, the action should fail gracefully (not crash)
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran and produced an outcome: $OUTCOME"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
