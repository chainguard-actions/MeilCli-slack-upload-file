name: Test custom slack_api_url
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          slack_token: xoxb-dummy-token-for-testing
          slack_api_url: https://slack.example.com/api/
          channel_id: C0000000000
          content: "Hello from custom API URL test"
          file_name: test.txt
          title: "Test File via Custom API URL"
          retries: "1"
      - name: Assert action ran (not skipped)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # With a dummy token and custom API URL the action will fail,
          # but it must not be skipped — it must have actually run.
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with outcome=$OUTCOME"
