name: Test file not found ignore
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          slack_token: xoxb-dummy-token-for-testing
          channel_id: C0000000000
          file_path: /nonexistent/path/to/file.txt
          if_no_files_found: ignore
          retries: "1"
      - name: Assert action succeeded when file not found with ignore
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "success" ]; then
            echo "FAIL: expected action to succeed when file not found with if_no_files_found=ignore, got outcome=$OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly ignored missing file"
