name: Test file path upload
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create test file
        run: |
          echo "This is a test file for slack upload" > /tmp/test-upload.txt
      - id: action
        uses: .
        continue-on-error: true
        with:
          slack_token: xoxb-dummy-token-for-testing
          channel_id: C0000000000
          file_path: /tmp/test-upload.txt
          file_name: test-upload.txt
          file_type: text
          title: "Test File Upload"
          initial_comment: "Automated test upload"
          retries: "1"
      - name: Assert action ran (not skipped)
        env:
          OUTCOME: ${{ steps.action.outcome }}
          RESPONSE: ${{ steps.action.outputs.response }}
        run: |
          echo "outcome: $OUTCOME"
          echo "response: $RESPONSE"
          # With a dummy token the API call will fail, but the action should
          # have found the file and attempted the upload (not skipped)
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with outcome=$OUTCOME"
