name: Test file path upload
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create test file
        run: |
          echo "test file content" > /tmp/test-upload.txt
      - id: action
        uses: .
        continue-on-error: true
        with:
          slack_token: "xoxb-fake-token-for-testing"
          slack_api_url: "http://localhost:9999/fake-slack-api/"
          channel_id: "C0000000000"
          file_path: "/tmp/test-upload.txt"
          file_path_follow_symbolic_links: "true"
          file_name: "test-upload.txt"
          if_no_files_found: "warn"
          thread_ts: "1234567890.123456"
          delete_file_ids_before_upload: "F0000000001,F0000000002"
          retries: "1"
      - name: Assert action ran
        run: |
          echo "Action completed (with or without error due to fake token)"
          echo "response: ${{ steps.action.outputs.response }}"
          echo "uploaded_file_ids: ${{ steps.action.outputs.uploaded_file_ids }}"
          echo "PASS: action step executed"
