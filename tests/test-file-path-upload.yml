name: Test file path upload inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create test file
        run: |
          echo "test file content" > /tmp/test-upload.txt
      - id: action
        uses: .
        continue-on-error: true
        with:
          slack_token: xoxb-fake-token-for-testing
          slack_api_url: http://localhost:9999/
          channel_id: C0000000000
          file_path: /tmp/test-upload.txt
          file_path_follow_symbolic_links: "true"
          if_no_files_found: warn
      - name: Assert action ran with file_path inputs
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action will fail because the slack_api_url is not real,
          # but we just need to verify the action was invoked with file_path inputs.
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action was invoked with file_path inputs"
