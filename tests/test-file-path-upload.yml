name: Test file path upload
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create test file
        run: |
          echo "test file content" > /tmp/test-upload.txt
      - id: action
        uses: .
        continue-on-error: true
        with:
          slack_token: xoxb-fake-token-for-testing
          slack_api_url: http://localhost:9999/
          channel_id: C0000000000
          file_path: /tmp/test-upload.txt
          file_path_follow_symbolic_links: true
          if_no_files_found: warn
          delete_file_ids_before_upload: "F0000000001,F0000000002"
      - name: Assert action ran (network failure expected with fake URL)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action executed"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
