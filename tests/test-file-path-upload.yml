name: Test file path upload attempt
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create test file
        run: |
          echo "This is a test file for slack upload" > /tmp/test-upload.txt
      - id: action
        uses: .
        continue-on-error: true
        with:
          slack_token: xoxb-fake-token-for-testing
          channel_id: C0000000000
          file_path: /tmp/test-upload.txt
          file_name: test-upload.txt
          file_type: text
          title: "Act Test File Upload"
          initial_comment: "Test file upload via file_path from act"
          retries: "1"
      - name: Assert action ran and produced an outcome
        env:
          OUTCOME: ${{ steps.action.outcome }}
          RESPONSE: ${{ steps.action.outputs.response }}
        run: |
          echo "outcome: $OUTCOME"
          echo "response: $RESPONSE"
          # With a fake token, we expect failure from the Slack API
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran and produced an outcome: $OUTCOME"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
