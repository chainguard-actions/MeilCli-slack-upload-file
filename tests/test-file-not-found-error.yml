name: Test file not found error
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          slack_token: xoxb-dummy-token-for-testing
          channel_id: C0000000000
          file_path: /nonexistent/path/to/file.txt
          if_no_files_found: error
          retries: "1"
      - name: Assert action failed due to missing file
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when file not found with if_no_files_found=error, got outcome=$OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed when file not found"
