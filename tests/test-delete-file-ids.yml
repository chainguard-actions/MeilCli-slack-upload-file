name: Test delete_file_ids_before_upload input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          slack_token: xoxb-fake-token-for-testing
          channel_id: C0000000000
          content: "Replacement file upload from act test"
          file_name: replacement-test.txt
          title: "Act Test Replacement Upload"
          delete_file_ids_before_upload: "F0000000001,F0000000002"
      - name: Assert action ran with delete_file_ids_before_upload input
        env:
          OUTCOME: ${{ steps.action.outcome }}
          RESPONSE: ${{ steps.action.outputs.response }}
        run: |
          echo "outcome: $OUTCOME"
          echo "response: $RESPONSE"
          # With a fake token, the action should fail gracefully (not crash)
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran and produced an outcome: $OUTCOME"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
