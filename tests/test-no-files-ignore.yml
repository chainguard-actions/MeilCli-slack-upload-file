name: Test if_no_files_found ignore
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          slack_token: xoxb-fake-token-for-testing
          channel_id: C0000000000
          file_path: /nonexistent/path/to/file.txt
          if_no_files_found: ignore
      - name: Assert response output exists
        env:
          RESPONSE: ${{ steps.action.outputs.response }}
          UPLOADED_IDS: ${{ steps.action.outputs.uploaded_file_ids }}
        run: |
          echo "response: $RESPONSE"
          echo "uploaded_file_ids: $UPLOADED_IDS"
          echo "PASS: action completed with if_no_files_found=ignore"
