name: Test content upload
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          slack_token: "xoxb-fake-token-for-testing"
          slack_api_url: "http://localhost:9999/fake-slack-api/"
          channel_id: "C0000000000"
          content: "Hello from test"
          file_name: "test.txt"
          file_type: "text"
          initial_comment: "Test upload"
          title: "Test File"
          retries: "1"
      - name: Assert action ran (outputs may be empty on failure)
        run: |
          echo "Action completed (with or without error due to fake token)"
          echo "response: ${{ steps.action.outputs.response }}"
          echo "uploaded_file_ids: ${{ steps.action.outputs.uploaded_file_ids }}"
          echo "PASS: action step executed"
