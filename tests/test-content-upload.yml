name: Test content upload attempt
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          slack_token: xoxb-fake-token-for-testing
          channel_id: C0000000000
          content: "Hello from act test"
          file_name: test-output.txt
          title: "Act Test Upload"
          initial_comment: "Test file upload from act"
      - name: Assert action ran and produced a response
        env:
          OUTCOME: ${{ steps.action.outcome }}
          RESPONSE: ${{ steps.action.outputs.response }}
        run: |
          echo "outcome: $OUTCOME"
          echo "response: $RESPONSE"
          # The action should either succeed or fail with an API error (not a crash)
          # With a fake token, we expect failure from the Slack API
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran and produced an outcome: $OUTCOME"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
