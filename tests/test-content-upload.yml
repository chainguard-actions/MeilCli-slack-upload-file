name: Test content upload
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Start mock Slack API server
        run: |
          # Start a simple HTTP server that returns a fake Slack API success response
          mkdir -p /tmp/mock-slack
          cat > /tmp/mock-slack/server.py << 'EOF'
          import http.server
          import json
          import threading

          class Handler(http.server.BaseHTTPRequestHandler):
              def do_POST(self):
                  content_length = int(self.headers.get('Content-Length', 0))
                  self.rfile.read(content_length)
                  response = json.dumps({
                      "ok": True,
                      "files": [{"id": "F12345678", "name": "test.txt"}]
                  }).encode()
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.send_header('Content-Length', str(len(response)))
                  self.end_headers()
                  self.wfile.write(response)
              def log_message(self, format, *args):
                  pass

          server = http.server.HTTPServer(('127.0.0.1', 18080), Handler)
          t = threading.Thread(target=server.serve_forever)
          t.daemon = True
          t.start()
          import time; time.sleep(86400)
          EOF
          python3 /tmp/mock-slack/server.py &
          sleep 1
          echo "Mock server started"
      - id: action
        uses: .
        continue-on-error: true
        with:
          slack_token: "xoxb-fake-token-for-testing"
          slack_api_url: "http://127.0.0.1:18080/"
          channel_id: "C12345678"
          content: "Hello from test!"
          file_name: "test.txt"
          file_type: "text"
          initial_comment: "Test upload"
          thread_ts: "1234567890.123456"
          title: "Test File"
          retries: "1"
          if_no_files_found: "warn"
      - name: Assert step ran
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          echo "Response: ${{ steps.action.outputs.response }}"
          echo "PASS: action step executed"
