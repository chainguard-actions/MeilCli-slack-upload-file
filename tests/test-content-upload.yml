name: Test content upload
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          slack_token: xoxb-dummy-token-for-testing
          channel_id: C0000000000
          content: "Hello from test"
          file_name: test.txt
          title: "Test File"
          initial_comment: "Test upload"
          retries: "1"
      - name: Assert response output is set
        env:
          RESPONSE: ${{ steps.action.outputs.response }}
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          echo "response: $RESPONSE"
          # The action should either succeed or fail with a response
          # With a dummy token it will fail, but the action should still
          # set the response output or exit with a non-zero code
          # We just verify the action ran (outcome is success or failure, not skipped)
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with outcome=$OUTCOME"
