name: Test content upload with all text inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          slack_token: xoxb-fake-token-for-testing
          slack_api_url: http://localhost:9999/
          channel_id: C0000000000
          content: "Hello from test"
          file_name: test-file.txt
          file_type: text
          initial_comment: "Test initial comment"
          thread_ts: "1234567890.123456"
          title: "Test File Title"
          retries: "1"
      - name: Assert action ran (outputs exist or action attempted)
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action will fail because the slack_api_url is not real,
          # but we just need to verify the action was invoked with all inputs.
          # A connection refused error is expected.
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action was invoked with all content-upload inputs"
