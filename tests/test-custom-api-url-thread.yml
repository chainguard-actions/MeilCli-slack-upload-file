name: Test custom API URL and thread reply
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          slack_token: xoxb-dummy-token-for-testing
          slack_api_url: https://slack.invalid/api/
          channel_id: C0000000000
          content: "Thread reply test content"
          file_name: thread-test.txt
          title: "Thread Reply Test"
          thread_ts: "1234567890.123456"
          retries: "1"
      - name: Assert action ran with custom API URL and thread_ts inputs
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # With an invalid slack_api_url, the action should fail (not be skipped)
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with outcome=$OUTCOME (slack_api_url and thread_ts inputs accepted)"
